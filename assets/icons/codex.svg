<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40" height="40">
  <defs>
    <!-- Blue-to-violet gradient for Codex -->
    <linearGradient id="codex-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B93FF" />
      <stop offset="100%" stop-color="#1F45FF" />
    </linearGradient>
    <filter id="codex-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#1F45FF" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Organic rounded blob shape -->
  <path d="M 12,2.5 C 16.5,2.8 21.2,6.5 21.2,11.8 C 21.2,17.2 16.5,21.2 12,21.5 C 7.5,21.8 2.8,17.2 2.8,11.8 C 2.8,6.5 7.5,2.2 12,2.5 Z" 
        fill="url(#codex-blue)" 
        filter="url(#codex-shadow)" />
        
  <!-- Coding Prompt: > _ in white -->
  <path d="M8.5 8 L12.5 12 L8.5 16" 
        stroke="#ffffff" 
        stroke-width="2.2" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />
        
  <line x1="14.5" y1="16" x2="18.5" y2="16" 
        stroke="#ffffff" 
        stroke-width="2.2" 
        stroke-linecap="round" />
</svg>
