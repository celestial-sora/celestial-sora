<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40" height="40">
  <defs>
    <!-- Neon green-to-emerald gradient for Localhost -->
    <linearGradient id="lh-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87" />
      <stop offset="100%" stop-color="#60EFFF" />
    </linearGradient>
    <filter id="lh-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Monitor Screen Outer Frame -->
  <rect x="2" y="3" width="20" height="13" rx="2" 
        stroke="url(#lh-grad)" 
        stroke-width="1.5" 
        fill="none" 
        filter="url(#lh-glow)" />
        
  <!-- Monitor Stand -->
  <path d="M8 20 H16 M12 16 V20" 
        stroke="url(#lh-grad)" 
        stroke-width="1.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />
        
  <!-- House shape inside the screen (representing "home server") -->
  <path d="M12 6 L7 10 V13 H10 V11 H14 V13 H17 V10 Z" 
        fill="url(#lh-grad)" />
</svg>
