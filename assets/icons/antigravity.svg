<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40" height="40">
  <defs>
    <!-- Rainbow Gradient matching official AntiGravity logo -->
    <linearGradient id="ag-rainbow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00A3FF" />
      <stop offset="25%" stop-color="#3CD351" />
      <stop offset="50%" stop-color="#FF8A00" />
      <stop offset="75%" stop-color="#FF3C3C" />
      <stop offset="100%" stop-color="#0057FF" />
    </linearGradient>
    <filter id="ag-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.12" />
    </filter>
  </defs>
  
  <!-- Stylized Capital A / Arch shape from official logo -->
  <path d="M 4,20.5 C 4.5,17 6,9 12,4.5 C 18,9 19.5,17 20,20.5 L 16,20.5 C 15.3,17.5 14.5,12 12,8.5 C 9.5,12 8.7,17.5 8,20.5 Z" 
        fill="url(#ag-rainbow)" 
        filter="url(#ag-shadow)" />
</svg>
