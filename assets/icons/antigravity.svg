<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40" height="40">
  <defs>
    <!-- Cosmic Violet-to-Cyan gradient -->
    <linearGradient id="ag-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F00FF" />
      <stop offset="100%" stop-color="#00F2FE" />
    </linearGradient>
    <filter id="ag-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Floating/defying gravity orbital ring -->
  <ellipse cx="12" cy="12" rx="9" ry="3" 
           stroke="url(#ag-grad)" 
           stroke-width="1.5" 
           fill="none" 
           transform="rotate(-25, 12, 12)" 
           opacity="0.8" />
  
  <!-- Central floating core (diamond crystal) -->
  <path d="M12 6 L15.5 12 L12 18 L8.5 12 Z" 
        fill="url(#ag-grad)" 
        filter="url(#ag-glow)" />

  <!-- Left code bracket < floating -->
  <path d="M6.5 9.5 L4.5 12 L6.5 14.5" 
        stroke="url(#ag-grad)" 
        stroke-width="1.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" 
        transform="rotate(-10, 5.5, 12)" />

  <!-- Right code bracket > floating -->
  <path d="M17.5 9.5 L19.5 12 L17.5 14.5" 
        stroke="url(#ag-grad)" 
        stroke-width="1.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" 
        transform="rotate(10, 18.5, 12)" />
</svg>
