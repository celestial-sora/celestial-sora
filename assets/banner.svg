<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="240">
  <defs>
    <!-- Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff79c6" />
      <stop offset="100%" stop-color="#bd93f9" />
    </linearGradient>

    <!-- D.Va Pink-to-Purple Gradient -->
    <linearGradient id="dva-pink-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9de2" />
      <stop offset="100%" stop-color="#e056fd" />
    </linearGradient>

    <!-- Text Title Gradient -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4791" />
      <stop offset="100%" stop-color="#a020f0" />
    </linearGradient>

    <!-- Subtle Shadow Filter for Premium Feel -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#bd93f9" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Card with rounded corners and border gradient -->
  <rect x="3" y="3" width="794" height="234" rx="16" fill="#ffffff" stroke="url(#border-grad)" stroke-width="2.5" filter="url(#shadow)" />

  <!-- D.Va Bunny Logo Group (Centered vertically on the left) -->
  <g transform="translate(45, 40) scale(1.6)">
    <!-- Bunny Main Body -->
    <path d="M 50,44 L 45,44 Q 35,25 22,10 Q 18,8 20,13 Q 26,30 35,46 Q 20,55 25,62 Q 30,75 50,88 Q 70,75 75,62 Q 80,55 65,46 Q 74,30 80,13 Q 82,8 78,10 Q 65,25 55,44 L 50,44 Z" 
          fill="url(#dva-pink-grad)" />
          
    <!-- Symmetrical Eyes (White) -->
    <path d="M 38,54 L 44,57 L 37,59 Z" fill="#ffffff" />
    <path d="M 62,54 L 56,57 L 63,59 Z" fill="#ffffff" />
    
    <!-- Nose (White) -->
    <path d="M 48,64 L 52,64 L 50,66 Z" fill="#ffffff" />
    
    <!-- Left Whiskers / Cheek Marks (White) -->
    <path d="M 26,50 L 30,52 L 29,54 L 25,52 Z" fill="#ffffff" />
    <path d="M 23,55 L 27,57 L 26,59 L 22,57 Z" fill="#ffffff" />
    
    <!-- Right Whiskers / Cheek Marks (White) -->
    <path d="M 74,50 L 70,52 L 71,54 L 75,52 Z" fill="#ffffff" />
    <path d="M 77,55 L 73,57 L 74,59 L 78,57 Z" fill="#ffffff" />
  </g>

  <!-- Title Text -->
  <text x="250" y="65" 
        font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" 
        font-size="28" 
        font-weight="800" 
        fill="url(#title-grad)">Alright. Gameface: On.</text>

  <!-- Bullet Items List -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="600" fill="#4a5568">
    <!-- Line 1 -->
    <g transform="translate(250, 100)">
      <path d="M 0,-5 L 5,0 L 0,5 L -5,0 Z" fill="url(#border-grad)" />
      <text x="18" y="4">No gender abnormalities</text>
    </g>
    
    <!-- Line 2 -->
    <g transform="translate(250, 126)">
      <path d="M 0,-5 L 5,0 L 0,5 L -5,0 Z" fill="url(#border-grad)" />
      <text x="18" y="4">Fullstack-Dev • Software-Dev</text>
    </g>
    
    <!-- Line 3 -->
    <g transform="translate(250, 152)">
      <path d="M 0,-5 L 5,0 L 0,5 L -5,0 Z" fill="url(#border-grad)" />
      <text x="18" y="4">Python • Astro • TypeScript • HTML • CSS • JS</text>
    </g>
    
    <!-- Line 4 -->
    <g transform="translate(250, 178)">
      <path d="M 0,-5 L 5,0 L 0,5 L -5,0 Z" fill="url(#border-grad)" />
      <text x="18" y="4">Design and customization • Arch Linux rising</text>
    </g>
    
    <!-- Line 5 -->
    <g transform="translate(250, 204)">
      <path d="M 0,-5 L 5,0 L 0,5 L -5,0 Z" fill="url(#border-grad)" />
      <text x="18" y="4">Music • Anime • Manga • Code • Games</text>
    </g>
  </g>
</svg>
